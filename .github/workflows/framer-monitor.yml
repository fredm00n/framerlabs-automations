name: Framer Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Run framer_templates
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DISCORD_WEBHOOK_URL_TEMPLATES: ${{ secrets.DISCORD_WEBHOOK_URL_TEMPLATES }}
          DISCORD_ALERTS_WEBHOOK_URL: ${{ secrets.DISCORD_ALERTS_WEBHOOK_URL }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python3 scripts/framer_templates.py
      - name: Commit error log and alert state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # The alert-state file is committed alongside the error log so the
          # cross-run Discord alert suppression survives between cron ticks.
          # It is script-specific (no cross-script writes) so it does not
          # race with reddit-leads-monitor's own commits.
          mkdir -p logs state
          touch logs/errors.jsonl state/alert_state-framer_templates.json
          git add logs/errors.jsonl state/alert_state-framer_templates.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update error log [skip ci]"
          # Push with exponential backoff (2s, 4s, 8s, 16s, 32s).  Both this
          # workflow and reddit-leads-monitor push to main and can race;
          # without retry a lost race silently drops the log entries from
          # the losing run.
          for attempt in 1 2 3 4 5; do
            # Abort any rebase left in progress by a prior failed attempt —
            # otherwise the next `git pull --rebase` aborts immediately with
            # "a rebase is in progress", dooming every remaining retry.
            git rebase --abort 2>/dev/null || true
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..." >&2
            sleep $((2 ** attempt))
          done
          echo "git push failed after 5 attempts" >&2
          exit 1
